name: EsquiloSpeak CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: maven

      - name: Run Backend Tests
        run: |
          cd backend
          JWT_SECRET=$(openssl rand -hex 32) \
          ANALYTICS_HASH_SECRET=$(openssl rand -hex 16) \
          INTERNAL_SERVICE_TOKEN=$(openssl rand -hex 32) \
          mvn test

  mobile-test:
    name: Mobile Tests & Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Mobile Dependencies
        run: |
          cd mobile
          flutter pub get

      - name: Run Flutter Analyze
        run: |
          cd mobile
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run Flutter Tests
        run: |
          cd mobile
          flutter test

      - name: Build Android Debug APK
        run: |
          cd mobile
          flutter build apk --debug
