name: EsquiloSpeak CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Backend Tests
        env:
          JWT_SECRET: ZXNxdWlsb3NwZWFrX3N1cGVyX3NlY3JldF9rZXlfZm9yX212cF90ZXN0aW5nXzEyMzQ1Njc4OTA=
          ANALYTICS_HASH_SECRET: dev-only-fallback-secret-key-1234567890
          INTERNAL_SERVICE_TOKEN: esquilospeak_internal_s2s_token_for_testing_32_bytes_long
        run: |
          cd backend
          mvn test

  mobile-test:
    name: Mobile Tests & Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Mobile Dependencies
        run: |
          cd mobile
          flutter pub get

      - name: Run Flutter Analyze
        run: |
          cd mobile
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run Flutter Tests
        run: |
          cd mobile
          flutter test
