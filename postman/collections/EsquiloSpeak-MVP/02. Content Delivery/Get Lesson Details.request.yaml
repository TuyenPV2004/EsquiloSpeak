$kind: http-request
url: "{{baseUrl}}/courses/{{courseId}}/lessons/{{lessonId}}"
method: GET
headers:
  Authorization: Bearer {{accessToken}}
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Verify lesson response structure", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.lessonId).to.equal(pm.environment.get("lessonId"));
          pm.expect(jsonData.questions).to.be.an('array');
      });
    language: text/javascript
order: 3000
