$kind: http-request
url: "{{baseUrl}}/courses/{{courseId}}/home"
method: GET
headers:
  Authorization: Bearer {{accessToken}}
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Verify courseHome format", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.courseId).to.equal(pm.environment.get("courseId"));
          pm.expect(jsonData.lessons).to.be.an('array');
      });
    language: text/javascript
order: 2000
