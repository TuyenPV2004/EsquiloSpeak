$kind: http-request
url: "{{baseUrl}}/courses"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Courses is an array", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.be.an('array');
      });
    language: text/javascript
order: 1000
