server:
  port: 8083

spring:
  application:
    name: content-service
  datasource:
    url: jdbc:postgresql://localhost:5433/EsquiloSpeak_db
    username: esquilospeak
    password: 123456
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: content_schema
  flyway:
    enabled: true
    schemas: content_schema
    default-schema: content_schema

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
