server:
  port: 8083

spring:
  application:
    name: content-service
  security:
    jwt:
      secret: ${JWT_SECRET}
  datasource:
    url: jdbc:postgresql://localhost:5433/EsquiloSpeak_db
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: content_schema
  flyway:
    enabled: true
    schemas: content_schema
    default-schema: content_schema
    baseline-on-migrate: true

internal:
  service:
    token: ${INTERNAL_SERVICE_TOKEN}

services:
  learning:
    base-url: ${LEARNING_SERVICE_URL:http://learning-service}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
