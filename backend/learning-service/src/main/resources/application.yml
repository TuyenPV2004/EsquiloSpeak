server:
  port: 8084

spring:
  application:
    name: learning-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/EsquiloSpeak_db}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: learning_schema
  flyway:
    enabled: true
    schemas: learning_schema,review_schema
    default-schema: learning_schema
    baseline-on-migrate: true
  security:
    jwt:
      secret: ${JWT_SECRET}
internal:
  service:
    token: ${INTERNAL_SERVICE_TOKEN}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

analytics:
  hash-secret: ${ANALYTICS_HASH_SECRET}
