server:
  port: 8084

spring:
  application:
    name: learning-service
  datasource:
    url: jdbc:postgresql://localhost:5433/EsquiloSpeak_db
    username: esquilospeak
    password: 123456
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: learning_schema

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

analytics:
  hash-secret: ${ANALYTICS_HASH_SECRET:dev-only-fallback-secret-key-1234567890}
