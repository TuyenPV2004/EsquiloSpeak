server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service-route
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/app-config, /api/v1/auth/**, /api/v1/onboarding, /api/v1/me
        - id: learning-service-route
          uri: lb://learning-service
          predicates:
            - Path=/api/v1/courses/{courseId}/attempts, /api/v1/courses/{courseId}/reviews/**, /api/v1/courses/{courseId}/review-attempts, /api/v1/courses/{courseId}/progress/**, /api/v1/sync/**, /api/v1/courses/{courseId}/lessons/{lessonId}/complete
        - id: content-service-route
          uri: lb://content-service
          predicates:
            - Path=/api/v1/courses, /api/v1/courses/{courseId}/home, /api/v1/courses/{courseId}/lessons/**
        - id: media-service-route
          uri: lb://media-service
          predicates:
            - Path=/api/v1/media/**

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
